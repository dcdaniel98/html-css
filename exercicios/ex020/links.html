<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        a {
            font: normal bold 1.2em Arial sans-serif;
            text-decoration: none;
            color: darkred;
        }
        a:hover {
            text-decoration: underline;
            color: black;
        }
        a::after{
            content: ' [link]';
            color: rgb(187, 187, 187);
            font-weight: lighter;
        }

        a:active {
            color: blue;
        }

        a:visited{
            color: green;
        }
    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <ul>
        <li>
            <a href="https://gustavoguanabara.github.io/" target="_blank" rel="external">Repsítorio GitHub</a>
        </li>
        <li>
            <a href="https://www.youtube.com/cursoemvideo" target="_blank" rel="external">Canal do YouTube</a>
        </li>
        <li>
            <a href="https://www.cursoemvideo.com/" target="_blank" rel="external">Site Curso em Video</a>
        </li>

    </ul>
    
</body>
</html>
