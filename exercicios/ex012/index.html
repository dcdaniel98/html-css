<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos em HTML5</title>
</head>
<body>
    <h1>Hospedando videos localmente</h1>
    <p>Este video está hospedado no meu própio sevidor </p>
    <video width="500px" poster="midia/limoes-capa.png" controls autoplay loop>
        <source src="midia/video-m4v.m4v" type="video/m4v">
       <source src="midia/video-webm.webm" type="video/webm">
    </video>

    <h1>Inserindo videos do YouTube</h1>
    <iframe width="500" height="280" src="https://www.youtube.com/embed/-1IGQAE-Hjg" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
    
    <h1>Inserindo videos do Vimeo</h1>
    <iframe title="vimeo-player" src="https://player.vimeo.com/video/197093965?h=7fbc516b5a" width="500" height="280" frameborder="0" allowfullscreen></iframe>

</body>
</html>
